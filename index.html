const COMPANY_ORDER = ["AIG","FWD","あいおい","アクサ","アフラック","あんしん","オリックス","ジブラルタ","第一ネオ","第一フロンティア","チューリッヒ","なないろ","日本生命","はなさく","ひまわり","マニュライフ","明治安田","メディケア","メットライフ","ソニー","エヌエヌ"];
function companyRank(name){
  const i = COMPANY_ORDER.indexOf(name);
  return i >= 0 ? i : 999;
}
function companyCompare(a,b){
  const ra = companyRank(a), rb = companyRank(b);
  if (ra !== rb) return ra - rb;
  return String(a).localeCompare(String(b), "ja");
}
function productCompare(a,b){
  const c = companyCompare(a["保険会社"], b["保険会社"]);
  if (c !== 0) return c;
  return String(a["商品名"]).localeCompare(String(b["商品名"]), "ja");
}
function optionCompanySorted(arr){
  return [...new Set(arr.filter(Boolean))].sort(companyCompare);
}

function norm(s){return String(s??"").toLowerCase().replace(/\s+/g,"").replace(/[　]/g,"");}

function groupsForScene(){return SCENE_GROUPS[document.getElementById("scene").value]||SCENE_GROUPS.all;}
function sceneMatch(r){
 const s=document.getElementById("scene").value;
 if(s==="corp") return !!r["法人推奨"];
 return groupsForScene().includes(r["分類"]);
}
function baseRows(){

}

 category.innerHTML=opt("all","中分類：すべて")+vals.map(v=>opt(v,v)).join("");
}
function fillMinor(){

}

}
function filtered(){

  if(comp!=="all"&&r["保険会社"]!==comp)return false;
  if(query&&!norm(Object.values(r).join(" ")).includes(query))return false;
  return true;
 });
}
function badge(t,c=""){return `<span class="badge ${c}">${esc(t)}</span>`;}

}
